<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Protótipo UTFPR - Evento</title>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen">
    <header class="bg-slate-700 text-white flex items-center justify-between pl-3 pr-32 py-0 h-16 shadow-md">
    
    <div class="flex items-center gap-6">
        <img src="UTFPR_logo.png" alt="Descrição da imagem">
        
        <div class="text-xl font-light border-l border-slate-700 pl-72">Extensão - Sistema de Gestão de Certificados Eletrônicos UTFPR</div>
    </div>

    <nav class="flex gap-8 text-base font-medium">
        <a href="#" class="border-b-2 border-yellow-500 pb-1 text-yellow-500">Evento</a>
        <a href="#" class="hover:text-gray-300 transition-colors">Cadastros</a>
        <a href="#" class="hover:text-gray-300 transition-colors">Certificados</a>
        <a href="#" class="hover:text-gray-300 transition-colors">Sistema</a>
    </nav>

</header>

    <main class="max-w-6xl mx-auto mt-10 p-8 bg-white shadow-lg rounded-xl border border-gray-200">
        
        <div class="flex items-center gap-4 mb-8 border-b border-gray-200 pb-8">
            <label for="eventoSelect" class="font-bold text-gray-600 text-sm tracking-wide">SELECIONAR EVENTO:</label>
            <select id="eventoSelect" class="flex-1 border border-gray-300 rounded-md p-3 bg-gray-50 text-gray-700 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 cursor-pointer">
                <option>Semana Acadêmica de Engenharia de Computação</option>
                <option>Outro Evento...</option>
            </select>
            <button class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-md shadow-sm transition-colors">
                CRIAR EVENTO
            </button>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-4 px-4 rounded-lg text-center transition-colors border border-gray-200">
                INFORMAÇÕES DO EVENTO
            </button>
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-4 px-4 rounded-lg text-center transition-colors border border-gray-200">
                MODELOS DE CERTIFICADO
            </button>
            <button class="bg-blue-600 text-white font-bold py-4 px-4 rounded-lg text-center shadow-md ring-2 ring-blue-600 ring-offset-2">
                ORGANIZADORES
            </button>
            <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-4 px-4 rounded-lg text-center transition-colors border border-gray-200">
                PARTICIPANTES
            </button>
        </div>

        <div class="border border-gray-200 rounded-lg p-8 bg-gray-50 min-h-[400px]">
            <div class="flex justify-between items-center mb-6 border-b border-gray-200 pb-4">
                <h3 class="text-2xl font-bold text-gray-800">Organizadores do Evento</h3>
                <button class="bg-blue-100 text-blue-700 font-bold py-2 px-4 rounded hover:bg-blue-200 transition-colors">
                    + Adicionar Organizador
                </button>
            </div>
            
            <ul class="flex flex-col gap-4">
                <li class="flex items-center justify-between bg-white p-5 border border-gray-200 rounded-lg shadow-sm">
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-lg">Leo</span>
                        <span class="text-gray-500 text-sm">Presidente / Administrativo</span>
                    </div>
                    <div class="flex gap-4">
                        <button class="text-blue-600 font-bold hover:underline px-2">EDITAR</button>
                        <button class="text-red-600 font-bold hover:underline px-2">REMOVER</button>
                    </div>
                </li>
                 <li class="flex items-center justify-between bg-white p-5 border border-gray-200 rounded-lg shadow-sm">
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 text-lg">Maria</span>
                        <span class="text-gray-500 text-sm">Promotora</span>
                    </div>
                    <div class="flex gap-4">
                        <button class="text-blue-600 font-bold hover:underline px-2">EDITAR</button>
                        <button class="text-red-600 font-bold hover:underline px-2">REMOVER</button>
                    </div>
                </li>
            </ul>
        </div>
    </main>
</body>
</html>
